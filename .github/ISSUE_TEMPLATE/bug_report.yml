name: Bug report
description: Something's broken or behaving unexpectedly.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. LastHit is PvP-only — please make sure your report is from a PvP context.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see? What did you expect to see instead?
      placeholder: "Target dropped below 30% HP but the LB never fired..."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug. If it's intermittent, say so.
      placeholder: |
        1. Queue Crystalline Conflict on Ninja
        2. Threshold mode = percent, value = 30
        3. Auto-target on
        4. ...
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: Commit SHA or release tag you're running.
      placeholder: "6d09e91 or v0.1.0"
    validations:
      required: true

  - type: input
    id: job
    attributes:
      label: Job
      description: The PvP job you were playing.
      placeholder: "Ninja"
    validations:
      required: true

  - type: textarea
    id: settings
    attributes:
      label: Relevant settings
      description: Threshold mode + value, auto-target on/off, auto-range, anything non-default.

  - type: textarea
    id: logs
    attributes:
      label: Logs / error text
      description: |
        Relevant lines from `/xllog`. Filter by `[LastHit]` if you can.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, other plugins that might interact, etc.
